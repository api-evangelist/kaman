specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Kaman Corporation
providerId: kaman
publisherName: Kaman Aerospace Group, Inc.
serviceCategory: Aerospace / Industrial Distribution
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Kaman does not expose a public usage-billing surface. FinOps shape inferred from a
  goods + parts-distribution model; meters reflect typical EDI / order-flow billable units.
tags:
  - Aerospace
  - Distribution
  - Industrial
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for Kaman Corporation B2B integration channels.
  Treated as goods / parts distribution, not as a metered API.
sources:
  - https://www.kaman.com/
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Goods / Parts Distribution
  billingFrequency: Per-Order
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Kaman B2B Integration
  ServiceCategory: Aerospace / Industrial Distribution
  ProviderName: Kaman Corporation
  PublisherName: Kaman Aerospace Group, Inc.
  InvoiceIssuerName: Kaman Aerospace Group, Inc.
  BillingCurrency: USD
meters:
  - name: purchase_orders
    unit: order
    aggregation: count
    dimensions:
      - division
      - customer
  - name: edi_messages
    unit: message
    aggregation: sum
    dimensions:
      - partner
      - document_type
  - name: line_items
    unit: line_item
    aggregation: sum
    dimensions:
      - division
      - customer
principles:
  - name: Visibility
    description: Reconcile EDI message counts and PO volumes against Kaman invoices since
      no first-party usage API is exposed.
  - name: Allocation
    description: Allocate by Kaman division (Aerospace vs Distribution) and by program /
      contract to mirror invoice line items.
  - name: Optimization
    description: Consolidate EDI partners and right-size order frequency to reduce
      per-message overhead and expedite-fee exposure.
  - name: Accountability
    description: Procurement / supply-chain owns Kaman spend; pair with the Kaman account
      manager for contract review.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
