providerId: kaman
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Kaman does not publish public rate-limit documentation. Limits, where applied to
  EDI / supplier-portal channels, are governed by the customer / supplier agreement.
  Reconciliation blocked pending public documentation.
tags:
  - Aerospace
  - Distribution
  - Industrial
  - Rate Limiting
description: Rate-limit artifact for Kaman Corporation B2B integration channels. No public
  per-second / per-minute limits are documented.
sources:
  - https://www.kaman.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contract-defined throttle
    scope: integration-contract
    metric: varies
    limit: see customer / supplier integration agreement
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses
      and honor the Retry-After header when present.
  - name: Contract-Provisioned Limits
    description: Where rate limits exist, they are scoped to the bilateral integration
      agreement.
